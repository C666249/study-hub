<body class="min-h-dvh" style="background: linear-gradient(180deg, #fef2f2 0%, #fff7ed 50%, #fffbeb 100%);">
<div id="app"></div>

<script>
// ============================================================
// DATA — 所有题库通过 fetch JSON 动态加载，不硬编码
// ============================================================
const ALL_QUESTIONS = [];
// 知识点颜色轮转调色板
const KP_COLORS = [
  { bg: 'bg-red-50', text: 'text-red-600', border: 'border-red-200' },
  { bg: 'bg-amber-50', text: 'text-amber-600', border: 'border-amber-200', via: 'amber' },
  { bg: 'bg-sky-50', text: 'text-sky-600', border: 'border-sky-200', via: 'sky' },
  { bg: 'bg-emerald-50', text: 'text-emerald-600', border: 'border-emerald-200', via: 'emerald' },
  { bg: 'bg-violet-50', text: 'text-violet-600', border: 'border-violet-200', via: 'violet' },
  { bg: 'bg-pink-50', text: 'text-pink-600', border: 'border-pink-200', via: 'pink' },
  { bg: 'bg-indigo-50', text: 'text-indigo-600', border: 'border-indigo-200', via: 'indigo' },
  { bg: 'bg-teal-50', text: 'text-teal-600', border: 'border-teal-200', via: 'teal' },
  { bg: 'bg-orange-50', text: 'text-orange-600', border: 'border-orange-200', via: 'orange' },
  { bg: 'bg-lime-50', text: 'text-lime-600', border: 'border-lime-200', via: 'lime' },
  { bg: 'bg-cyan-50', text: 'text-cyan-600', border: 'border-cyan-200', via: 'cyan' },
  { bg: 'bg-fuchsia-50', text: 'text-fuchsia-600', border: 'border-fuchsia-200', via: 'fuchsia' },
];

// 作业组分隔线 冰蓝+翡翠绿轮转（两端虚化）
const HW_DIVIDER_GRADIENTS = [
  'bg-gradient-to-r from-transparent via-sky-300 to-transparent',
  'bg-gradient-to-r from-transparent via-emerald-300 to-transparent',
];

// 科目元数据（作业标签等）
const SUBJECT_META = {
  '刑法': { homeworkLabels: { 1: '作业一（刑法的效力）', 2: '作业二（犯罪构成）' } },
  '马原': { homeworkLabels: {} },
  '行政法': { homeworkLabels: {} }
};

// ============================================================
// STORAGE — keys must match currentSubject to avoid cross-subject data mix
// ============================================================
let STORAGE_KEY = 'studyhub_progress_马原';
let WRONG_KEY = 'studyhub_wrong_马原';
let FAVORITES_KEY = 'studyhub_fav_马原';

function getValidIds(key) {
    try {
        const ids = JSON.parse(localStorage.getItem(key) || '[]');
        if (!ALL_QUESTIONS.length) return ids;
        const validSet = new Set(ALL_QUESTIONS.map(q => q.id));
        const valid = ids.filter(id => validSet.has(id));
        // Auto-clean: if stale IDs found, save cleaned list back
        if (valid.length !== ids.length) localStorage.setItem(key, JSON.stringify(valid));
        return valid;
    } catch(e) { return []; }
}
function getWrongQuestions() { return getValidIds(WRONG_KEY); }
function saveWrongQuestions(ids) { localStorage.setItem(WRONG_KEY, JSON.stringify(ids)); }
function getFavorites() { return getValidIds(FAVORITES_KEY); }
function saveFavorites(ids) { localStorage.setItem(FAVORITES_KEY, JSON.stringify(ids)); }

// ============================================================
// CORE LOGIC (from src/core.js — tested)
// ============================================================
function isAnswerCorrect(userAnswer, correctAnswer, type) {
    if (!userAnswer || !correctAnswer) return false;
    if (type === 'multiple') return userAnswer.split('').sort().join('') === correctAnswer.split('').sort().join('');
    return userAnswer === correctAnswer;
}
function searchQuestions(query, questions) {
    if (!query || !query.trim()) return [...questions];
    const q = query.trim().toLowerCase();
    return questions.filter(item => {
        const text = [item.question||'', ...Object.values(item.options||{}), item.explanation||'', ...(item.tags||[])].join(' ').toLowerCase();
        return text.includes(q);
    });
}
function getQuestionsByTag(tag, questions) { return !tag ? [...questions] : questions.filter(q => (q.tags||[]).includes(tag)); }
function getKnowledgePointStats(qs) { const s={}; qs.forEach(q => (q.tags||[]).forEach(t => s[t]=(s[t]||0)+1)); return s; }
function extractSortNum(v) {
    if (typeof v === 'number') return v;
    const s = String(v);
    let m = s.match(/(\d+)/);
    if (m) return parseInt(m[1]);
    const cn = {'一':1,'二':2,'三':3,'四':4,'五':5,'六':6,'七':7,'八':8,'九':9,'十':10,'百':100};
    m = s.match(/[一二三四五六七八九十百]/);
    if (m) {
        const m2 = s.match(/([一二三])?十([一二三四五六七八九])?/);
        if (m2 && (m2[1] || m2[0].startsWith('十'))) {
            let v = 0;
            if (m2[1]) v += cn[m2[1]] * 10;
            else if (m2[0].startsWith('十')) v += 10;
            if (m2[2]) v += cn[m2[2]];
            return v;
        }
        return cn[m[0]] || 0;
    }
    return 999;
}
function getHwGroupKey(hw) {
    // Pattern key: replace number with #, keep surrounding structural chars
    // "第1章 ABC" → "第#章" (strips chapter name after 章)
    // "第一次作业" → "第#次作业"
    // "平时作业（一）" → "平时作业（#）"
    // "马克思主义哲学练习题二" → "马克思主义哲学练习#" (normalize 题)
    const s = String(hw);
    let numStr = '', idx = -1;
    let am = s.match(/(\d+)/);
    if (am) { numStr = am[0]; idx = am.index; }
    else { let cm = s.match(/[一二三四五六七八九十百]+/); if (cm) { numStr = cm[0]; idx = cm.index; } }
    if (idx < 0) return s;
    let pattern = s.substring(0, idx) + '#' + s.substring(idx + numStr.length);
    // Normalize: strip chapter-specific name after "章" so all chapters share one group
    pattern = pattern.replace(/^(第#章).*/, '$1');
    // Normalize: "练习#" == "练习题#" → strip trailing 题 before #
    pattern = pattern.replace(/题#/, '#');
    return pattern;
}
function getGroupLabel(pattern) {
    // Auto-label from pattern: strip （#） wrapper, replace # with N (only when not at edges)
    if (pattern === '第#章') return '章节练习';
    if (pattern === '#') return '作业练习';
    let label = pattern.replace(/[（(]\s*#\s*[）)]/, '');
    label = label.replace(/#$/, '').replace('#', 'N');
    return label.trim();
}
function getHwGroups(hwList) {
    // Returns: [{ key, label, items[], minNum }] sorted by (minNum, key.length, key)
    const groups = new Map();
    hwList.forEach(hw => {
        const gk = getHwGroupKey(hw);
        if (!groups.has(gk)) groups.set(gk, []);
        groups.get(gk).push(hw);
    });
    const result = [...groups.entries()].map(([key, items]) => ({
        key, items,
        label: getGroupLabel(key),
        minNum: Math.min(...items.map(h => extractSortNum(h)))
    }));
    result.sort((a, b) =>
        a.minNum !== b.minNum ? a.minNum - b.minNum :
        a.key.length !== b.key.length ? a.key.length - b.key.length :
        (a.key < b.key ? -1 : 1));
    result.forEach(g => g.items.sort((a, b) => extractSortNum(a) - extractSortNum(b)));
    return result;
}
function shuffleArray(arr) { const r=[...arr]; for(let i=r.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[r[i],r[j]]=[r[j],r[i]];} return r; }

// ============================================================
// STATE
// ============================================================
let currentView = 'home';
let questionList = [], userAnswers = {};
let currentQuestionIndex = 0;
let currentHomework = 'all', currentType = 'all', currentTag = null;
let currentShuffleMode = false, currentWrongOnlyMode = false, currentFavoritesOnlyMode = false;
let isExamMode = false;
let searchQuery = '';
let sessionWrongIds = [];  // 本轮答题中的错题ID
let currentMultipleSelections = {};
let currentSubject = '马原';
let collapsedSections = new Set();  // 折叠的节
let savedScrollY = 0;              // 离开首页时的滚动位置
let currentTheme = localStorage.getItem('studyhub_theme') || 'light';  // 首页主题

function toggleTheme() {
    currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
    localStorage.setItem('studyhub_theme', currentTheme);
    render();
}

// 科目题库映射（Trae 的 JSON 加载后会填充这里）
// ★ 科目注册表 — 加新科目只改这一行
const SUBJECT_LIST = ['马原', '行政法', '刑法'];

// 所有科目通过 fetch JSON 动态加载
const SUBJECT_DATA = Object.fromEntries(SUBJECT_LIST.map(s => [s, null]));

async function switchSubject(subject) {
    if (currentSubject === subject) return;
    currentSubject = subject;
    STORAGE_KEY = 'studyhub_progress_' + subject;
    WRONG_KEY = 'studyhub_wrong_' + subject;
    FAVORITES_KEY = 'studyhub_fav_' + subject;
    searchQuery = '';

    // 已加载 → 直接切换
    if (SUBJECT_DATA[subject] && SUBJECT_DATA[subject].length > 0) {
        ALL_QUESTIONS.length = 0;
        ALL_QUESTIONS.push(...SUBJECT_DATA[subject]);
        goHome();
        return;
    }

    // 尝试 fetch JSON（Netlify 部署后生效）
    try {
        const resp = await fetch('data/' + subject + '.json');
        if (resp.ok) {
            const data = await resp.json();
            SUBJECT_DATA[subject] = data;
            ALL_QUESTIONS.length = 0;
            ALL_QUESTIONS.push(...data);
            goHome();
            return;
        }
    } catch(e) { /* fetch 失败 → 显示空状态 */ }

    // 无数据 → 空状态
    ALL_QUESTIONS.length = 0;
    goHome();
}

// ============================================================
// NAVIGATION
// ============================================================
function startPractice(opts = {}) {
    isExamMode = false;
    sessionWrongIds = [];
    currentHomework = opts.hw || 'all';
    currentType = opts.type || 'all';
    currentTag = opts.tag || null;
    currentShuffleMode = opts.shuffle || false;
    currentWrongOnlyMode = opts.wrongOnly || false;
    currentFavoritesOnlyMode = opts.favOnly || false;
    currentQuestionIndex = 0;
    currentMultipleSelections = {};

    let pool = [...ALL_QUESTIONS];
    if (opts.hw && opts.hw !== 'all') { const n = parseInt(opts.hw); pool = pool.filter(q => isNaN(n) ? q.homework === opts.hw : q.homework === n); }
    if (opts.type && opts.type !== 'all') pool = pool.filter(q => q.type === opts.type);
    if (opts.tag) pool = getQuestionsByTag(opts.tag, pool);
    if (opts.wrongOnly) { const ids = getWrongQuestions(); pool = pool.filter(q => ids.includes(q.id)); }
    if (opts.favOnly) { const ids = getFavorites(); pool = pool.filter(q => ids.includes(q.id)); }
    // 搜索/精准跳转: 按指定 ID 列表过滤
    if (opts.searchIds) {
        const idSet = new Set(opts.searchIds.split(','));
        const seen = new Set();
        pool = pool.filter(q => { if (!idSet.has(q.id)) return false; if (seen.has(q.id)) return false; seen.add(q.id); return true; });
    }

    questionList = pool;
    if (opts.shuffle && questionList.length > 1) questionList = shuffleArray(questionList);
    // 精准跳转到指定题目
    if (opts.startId) {
        const idx = questionList.findIndex(q => q.id === opts.startId);
        if (idx >= 0) currentQuestionIndex = idx;
    }

    userAnswers = {};
    const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
    if (opts.resetWrong) {
        // 错题重做：错题答案清空，非错题保留
        const wrongSet = new Set(getWrongQuestions());
        questionList.forEach(q => { userAnswers[q.id] = wrongSet.has(q.id) ? null : (saved[q.id] || null); });
    } else {
        questionList.forEach(q => { userAnswers[q.id] = saved[q.id] || null; });
    }

    // 进度恢复：跳到第一个未答题
    if (!opts.startId && !opts.shuffle && !opts.resetWrong) {
        const firstUnanswered = questionList.findIndex(q => !saved[q.id]);
        if (firstUnanswered >= 0) currentQuestionIndex = firstUnanswered;
    }

    currentHomework = opts.hw || 'all';
    currentType = opts.type || 'all';
    currentView = 'quiz';
    render();
}

function startExam() {
    isExamMode = true;
    sessionWrongIds = [];
    currentQuestionIndex = 0;
    currentMultipleSelections = {};
    questionList = shuffleArray([...ALL_QUESTIONS]);
    userAnswers = {};
    const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
    questionList.forEach(q => { userAnswers[q.id] = saved[q.id] || null; });
    currentView = 'quiz';
    render();
}

function toggleSection(id) {
    if (collapsedSections.has(id)) collapsedSections.delete(id);
    else collapsedSections.add(id);
    const el = document.getElementById(id);
    if (el) el.classList.toggle('hidden');
    // 翻转三角
    const arrow = document.getElementById(id + '_arrow');
    if (arrow) arrow.style.transform = collapsedSections.has(id) ? 'rotate(-90deg)' : 'rotate(0deg)';
}
function goHome() { isExamMode = false; currentView = 'home'; searchQuery = ''; render(); }
function showResult() { currentView = 'result'; render(); }
function prevQuestion() { if (currentQuestionIndex > 0) { currentQuestionIndex--; currentMultipleSelections = {}; render(); } }
function nextQuestion() { if (currentQuestionIndex < questionList.length - 1) { currentQuestionIndex++; currentMultipleSelections = {}; render(); } }

// ============================================================
// QUIZ LOGIC
// ============================================================
function submitAnswer(qid, answer) {
    if (userAnswers[qid]) return;
    userAnswers[qid] = answer;
    const q = questionList.find(x => x.id === qid);
    if (!q) return;

    // 简答/论述题不判对错，直接保存进度
    if (q.type === 'short') {
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
        saved[qid] = answer;
        localStorage.setItem(STORAGE_KEY, JSON.stringify(saved));
        render();
        return;
    }

    const correct = isAnswerCorrect(answer, q.answer, q.type);
    const wrongIds = getWrongQuestions();
    if (correct) { const idx = wrongIds.indexOf(qid); if (idx >= 0) wrongIds.splice(idx, 1); }
    else { if (!wrongIds.includes(qid)) wrongIds.push(qid); if (!sessionWrongIds.includes(qid)) sessionWrongIds.push(qid); }
    saveWrongQuestions(wrongIds);

    const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
    saved[qid] = answer;
    localStorage.setItem(STORAGE_KEY, JSON.stringify(saved));
    render();
}

function toggleFavorite(qid) {
    const favs = getFavorites();
    const idx = favs.indexOf(qid);
    if (idx >= 0) favs.splice(idx, 1); else favs.push(qid);
    saveFavorites(favs);
    render();
}

function toggleMultipleOption(qid, key) {
    if (userAnswers[qid]) return;
    if (!currentMultipleSelections) currentMultipleSelections = {};
    currentMultipleSelections[key] = !currentMultipleSelections[key];
    render();
}
function confirmMultipleAnswer(qid) {
    const sel = Object.keys(currentMultipleSelections||{}).filter(k => currentMultipleSelections[k]).sort().join('');
    if (!sel) return;
    submitAnswer(qid, sel);
    currentMultipleSelections = {};
}
function resetAnswer(qid) {
    userAnswers[qid] = null;
    const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
    delete saved[qid];
    localStorage.setItem(STORAGE_KEY, JSON.stringify(saved));
    currentMultipleSelections = {};
    render();
}

// ============================================================
// SEARCH
// ============================================================
function handleSearchInput(val) {
    searchQuery = val;
    const area = document.getElementById('search-results-area');
    if (!area) return;
    if (!val || !val.trim()) { area.innerHTML = ''; return; }
    const results = searchQuestions(val, ALL_QUESTIONS);
    if (results.length === 0) {
        area.innerHTML = '<div class="text-center text-gray-400 text-sm py-3">未找到匹配题目</div>';
        return;
    }
    const kpStats = getKnowledgePointStats(results);
    area.innerHTML = `
        <button onclick="document.getElementById('search-input').value='';startPractice({searchIds:'${results.map(r=>r.id).join(',')}',shuffle:false})"
            class="w-full py-2.5 bg-red-500 text-white rounded-xl text-sm font-medium hover:bg-red-600 transition-all mb-2">
            练习全部 ${results.length} 题
        </button>
        <div class="text-xs text-gray-400 mb-2">
            匹配知识点：${Object.entries(kpStats).map(([k,v]) => '<span class="inline-block px-2 py-0.5 bg-red-50 text-red-500 rounded-full mr-1">'+k+'('+v+')</span>').join(' ')}
        </div>
        <div class="space-y-1.5 max-h-48 overflow-y-auto">
            ${results.slice(0, 8).map(r => {
                const hw = '作业'+r.homework;
                const preview = r.question.length > 35 ? r.question.substring(0,35)+'…' : r.question;
                return `<button onclick="document.getElementById('search-input').value='';startPractice({searchIds:'${results.map(r=>r.id).join(',')}',startId:'${r.id}'})"
                    class="w-full text-left text-xs text-gray-600 py-1.5 px-2 bg-gray-50 rounded-lg flex items-center gap-2 hover:bg-gray-100 transition-all">
                    <span class="shrink-0 w-5 h-5 rounded-md bg-red-100 text-red-500 flex items-center justify-center" style="font-size:10px">${r.type==='judge'?'判':r.type==='multiple'?'多':'单'}</span>
                    <span class="truncate">${escHtml(preview)}</span>
                    <span class="shrink-0 text-gray-400">${hw}</span>
                    ${(r.tags||[]).map(t=>'<span class="shrink-0 px-1.5 py-0.5 rounded text-red-400 bg-red-50" style="font-size:10px">'+t+'</span>').join('')}
                </button>`;
            }).join('')}
            ${results.length > 8 ? '<div class="text-xs text-gray-400 text-center py-1">还有 '+(results.length-8)+' 题…</div>' : ''}
        </div>`;
}

// ============================================================
// STATS
// ============================================================
function getAnsweredCount() { return questionList.filter(q => userAnswers[q.id]).length; }
function getCorrectCount() {
    return questionList.filter(q => {
        const ua = userAnswers[q.id]; if (!ua) return false;
        if (q.type === 'short') return true; // 简答题标记已复习即算完成
        return isAnswerCorrect(ua, q.answer, q.type);
    }).length;
}

function renderQuiz() {
    if (!questionList.length) {
        return `<div class="max-w-md mx-auto p-6 text-center pt-20">
            <div class="text-5xl mb-4">📭</div>
            <div class="text-gray-500 mb-4">当前筛选条件下没有题目</div>
            <button onclick="goHome()" class="px-6 py-3 bg-red-500 text-white rounded-xl hover:bg-red-600 transition-all">返回首页</button>
        </div>`;
    }

    const q = questionList[currentQuestionIndex];
    if (!q) return '';
    const total = questionList.length;
    const answered = getAnsweredCount();
    const progress = total > 0 ? Math.round((currentQuestionIndex+1)/total*100) : 0;
    const ua = userAnswers[q.id];
    const isAns = !!ua;
    let isCorrect = false;
    if (isAns) isCorrect = isAnswerCorrect(ua, q.answer, q.type);
    const isFav = getFavorites().includes(q.id);

    const hwLabels = {1:'作业一',2:'作业二'};
    function getHwLabel(hw) { return hwLabels[hw] || (typeof hw === 'number' ? '作业'+hw : String(hw)); }
    const typeLabels = {judge:'判断',single:'单选',multiple:'多选',short:'简答'};
    const typeColors = {judge:{bg:'bg-purple-50',text:'text-purple-600'},single:{bg:'bg-blue-50',text:'text-blue-600'},multiple:{bg:'bg-green-50',text:'text-green-600'},short:{bg:'bg-orange-50',text:'text-orange-600'}};
    const tc = typeColors[q.type] || typeColors.single;

    let answerSection = '';
    if (q.type === 'judge') {
        answerSection = `
        <div class="grid grid-cols-2 gap-3">
            ${['对','错'].map(opt => {
                let cls = 'border-gray-200 hover:border-green-400 hover:bg-green-50';
                if (isAns) {
                    if (opt === q.answer) cls = 'border-green-500 bg-green-50 text-green-700';
                    else if (opt === ua && !isCorrect) cls = 'border-red-500 bg-red-50 text-red-700';
                    else cls = 'border-gray-200 text-gray-300';
                }
                return `<button onclick="submitAnswer('${q.id}','${opt}')" class="option-btn p-4 rounded-xl border-2 transition-all font-bold text-center ${cls}">
                    <div class="text-xl">${opt==='对'?'✓':'✗'}</div><div class="text-sm mt-1">${opt==='对'?'正确':'错误'}</div></button>`;
            }).join('')}
        </div>`;
    } else if (q.type === 'single') {
        answerSection = `
        <div class="space-y-2.5">
            ${Object.entries(q.options||{}).map(([k,v]) => {
                let cls = 'border-gray-200 hover:border-red-400 hover:bg-red-50';
                if (isAns) {
                    if (k === q.answer) cls = 'border-green-500 bg-green-50 text-green-700';
                    else if (k === ua && !isCorrect) cls = 'border-red-500 bg-red-50 text-red-700';
                    else cls = 'border-gray-200 text-gray-300';
                }
                return `<button onclick="submitAnswer('${q.id}','${k}')" class="option-btn w-full text-left p-3.5 rounded-xl border-2 transition-all ${cls}"><span class="font-bold mr-2">${k}.</span>${escHtml(v)}</button>`;
            }).join('')}
        </div>`;
    } else if (q.type === 'multiple') {
        answerSection = `
        <div class="space-y-2.5 mb-3">
            ${Object.entries(q.options||{}).map(([k,v]) => {
                const sel = isAns ? ua.includes(k) : (currentMultipleSelections[k]||false);
                let cls = '';
                if (isAns) {
                    if (q.answer.includes(k)) cls = 'border-green-500 bg-green-50 text-green-700';
                    else if (sel && !q.answer.includes(k)) cls = 'border-red-500 bg-red-50 text-red-700';

function resetAll() {
    if (confirm('确定要清除所有答题进度、错题和收藏记录吗？此操作不可撤销。')) {
        localStorage.removeItem(STORAGE_KEY);

        render();

}
function exportData() {
    const backup = {};
    const total = localStorage.length;
    for (let i = 0; i < total; i++) {
        const key = localStorage.key(i);
        if (key && key.startsWith('studyhub_')) {
            backup[key] = localStorage.getItem(key);
        }
    }
    const blob = new Blob([JSON.stringify(backup, null, 2)], {type: 'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'study-hub-backup-' + new Date().toISOString().slice(0,10) + '.json';
    a.click();
    URL.revokeObjectURL(url);
}
function importData(input) {
    const file = input.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
        try {
            const backup = JSON.parse(e.target.result);
            const keys = Object.keys(backup);
            if (keys.length === 0 || !keys[0].startsWith('studyhub_')) {
                alert('文件格式不正确，请选择 study-hub 备份文件');
                return;
            }
            if (!confirm('将恢复 ' + keys.length + ' 个存储项（覆盖当前数据），确定继续？')) return;
            keys.forEach(k => localStorage.setItem(k, backup[k]));
            alert('恢复完成！页面将刷新。');
            location.reload();
        } catch(ex) {
            alert('文件解析失败，请检查文件是否损坏');
        }
    };
    reader.readAsText(file);
    input.value = '';
}

function formatExplanation(expl) {
    if (!expl) return '';
    // Split "A. 正确。...B. 错误。..." into per-option lines
    const parts = expl.split(/(?=[A-E][.．]\s*(?:正确|错误))/);
    return parts.map(p => {
        const m = p.match(/^([A-E])[.．]\s*(正确|错误)[.。]\s*(.+)/);
        if (!m) return p.trim();
        const icon = m[2] === '正确' ? '✓' : '✗';
        const cls = m[2] === '正确' ? 'text-emerald-600' : 'text-rose-500';
        return '<span class="inline-block mr-3 mb-1"><b class="'+cls+'">'+icon+' '+m[1]+'</b> '+escHtml(m[3].trim())+'</span>';
    }).join('');
}

    }
    if (q.answer) ctx += '正确答案：'+q.answer+'\n';

// ── 题号导航弹窗 ──
let navPressTimer = null;
function showQuestionNav() {
    const overlay = document.createElement('div');
    overlay.className = 'fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4';
    overlay.onclick = function(e) { if (e.target === overlay) { overlay.remove(); dismissNavPreview(); } };
    let h = '<div class="bg-white rounded-2xl p-5 max-w-sm w-full max-h-[80vh] overflow-y-auto">';
    h += '<div class="font-bold text-gray-800 mb-3">题目导航</div><div class="grid grid-cols-5 gap-2 select-none" style="-webkit-user-select:none;user-select:none">';
    questionList.forEach(function(q, i) {
        var ua = userAnswers[q.id], isAns = !!ua, bg = 'bg-gray-100 text-gray-500';
        if (isAns) {
            var correct = q.type === 'multiple' ? ua.split('').sort().join('') === q.answer.split('').sort().join('') : ua === q.answer;
            bg = correct ? 'bg-emerald-100 text-emerald-600' : 'bg-rose-100 text-rose-500';
        }
        if (i === currentQuestionIndex) bg += ' ring-2 ring-indigo-400';
        h += '<button onclick="jumpToQuestion('+i+')"';
        h += ' onmousedown="startNavPreview('+i+',event)" onmouseleave="clearNavPreview()"';
        h += ' ontouchstart="startNavPreview('+i+',event)" ontouchmove="clearNavPreview()"';
        h += ' oncontextmenu="return false"';
        h += ' class="'+bg+' rounded-lg py-2 text-xs font-bold transition-all hover:scale-105 select-none" style="-webkit-user-select:none;user-select:none;-webkit-touch-callout:none">'+(i+1)+'</button>';
    });
    h += '</div></div>';
    overlay.innerHTML = h;
    overlay.id = 'qnav-overlay';
    document.body.appendChild(overlay);
}
function jumpToQuestion(idx) { currentQuestionIndex = idx; currentMultipleSelections = {}; dismissNavPreview(); var o=document.getElementById('qnav-overlay'); if(o) o.remove(); render(); }
function startNavPreview(idx, e) {
    dismissNavPreview();
    navPressTimer = setTimeout(function() {
        var q = questionList[idx]; if (!q) return;
        var tip = document.createElement('div');
        tip.id = 'qnav-tip';
        tip.className = 'fixed z-50 bg-gray-900 text-white text-xs rounded-xl shadow-lg max-w-[300px] leading-relaxed';
        tip.onclick = function(ev) { ev.stopPropagation(); dismissNavPreview(); };
        var cx = e.touches ? e.touches[0].clientX : e.clientX;
        var cy = e.touches ? e.touches[0].clientY : e.clientY;
        tip.style.left = Math.min(cx + 10, window.innerWidth - 310) + 'px';
        tip.style.top = Math.max(cy - 80, 10) + 'px';
        var html = '<div class="flex items-start justify-between gap-2 p-3"><div class="flex-1"><span class="text-gray-400 font-bold">'+(idx+1)+'.</span> <span class="font-bold">'+escHtml(q.question)+'</span>';
        if (q.options) {
            html += '<div class="mt-1.5 pt-1.5 border-t border-gray-700 text-gray-300">';
            for (var k in q.options) {
                html += '<div class="mt-0.5"><b class="text-gray-400">'+k+'.</b> '+escHtml(q.options[k])+'</div>';
            }
            html += '</div>';
        }
        html += '</div><button class="shrink-0 w-5 h-5 rounded-full bg-gray-700 hover:bg-gray-600 text-gray-400 flex items-center justify-center text-xs leading-none" onclick="event.stopPropagation();dismissNavPreview()">&times;</button></div>';
        tip.innerHTML = html;
        document.body.appendChild(tip);
    }, 400);
}
function dismissNavPreview() { if (navPressTimer) clearTimeout(navPressTimer); navPressTimer = null; var t=document.getElementById('qnav-tip'); if(t) t.remove(); }
function clearNavPreview() { if (navPressTimer) clearTimeout(navPressTimer); }
function escHtml(s) { if (!s) return ''; return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function render() {
    const app = document.getElementById('app');
    // 离开首页时记住滚动（非首页视图且有星空元素说明刚从首页切走）
    if (currentView !== 'home' && document.getElementById('home-stars')) {
        savedScrollY = window.scrollY;
    }
    if (currentView === 'home') {
        app.innerHTML = renderHome();
        // 生成星空
        const starsEl = document.getElementById('home-stars');
        if (starsEl && !starsEl.children.length) {
            for (let i = 0; i < 60; i++) {
                const d = document.createElement('div');
                d.className = 'star';
                const size = Math.random() * 2 + 0.5;
                d.style.cssText = 'left:' + Math.random()*100 + '%;top:' + Math.random()*100 + '%;width:' + size + 'px;height:' + size + 'px;--d:' + (Math.random()*3+2) + 's;--delay:' + (Math.random()*5) + 's;--peak:' + (Math.random()*0.5+0.3);
                starsEl.appendChild(d);
            }
        }
        if (searchQuery) setTimeout(() => handleSearchInput(searchQuery), 50);
        // 恢复滚动位置
        if (savedScrollY > 0) setTimeout(() => window.scrollTo(0, savedScrollY), 60);
    }
    else if (currentView === 'quiz') app.innerHTML = renderQuiz();
    else if (currentView === 'result') app.innerHTML = renderResult();
}

                const data = await resp.json();
                SUBJECT_DATA[subj] = data;

                ALL_QUESTIONS.push(...data);
                currentSubject = subj;
                STORAGE_KEY = 'studyhub_progress_' + subj;
                WRONG_KEY = 'studyhub_wrong_' + subj;

    // 所有科目加载失败，显示空状态
    render();
})();
