<!DOCTYPE html>
<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stream Test</title>
<style>body{font-family:sans-serif;padding:16px}#out{white-space:pre-wrap;background:#f5f5f5;padding:12px;border-radius:8px;min-height:60px}</style>
</head><body>
<h3>SSE Stream Test</h3>
<div id="out">Waiting...</div>
<script>
const API_KEY='sk-WES8VsOhWEkpWpWjK5dkn1nh4vi7Te9P5AduH456OAy5H7KI';
const ENDPOINT='https://apihub.agnes-ai.com/v1/chat/completions';

async function test() {
  const out=document.getElementById('out');
  out.textContent='Requesting...';

  try {
    const r=await fetch(ENDPOINT,{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+API_KEY},
      body:JSON.stringify({
        model:'agnes-2.0-flash',
        messages:[{role:'user',content:'说三个字'}],
        max_tokens:50,
        temperature:0.7,
        stream:true
      })
    });

    out.textContent='Status: '+r.status+'\n';
    if(!r.ok){out.textContent+='Error: '+r.status;return;}

    const reader=r.body.getReader();
    const decoder=new TextDecoder();
    let full='';

    while(true){
      const {done,value}=await reader.read();
      if(done)break;
      const chunk=decoder.decode(value,{stream:true});
      const lines=chunk.split('\n');
      for(const line of lines){
        if(!line.startsWith('data: '))continue;
        const data=line.slice(6);
        if(data==='[DONE]'){out.textContent+=full;return;}
        try{
          const json=JSON.parse(data);
          const delta=json.choices&&json.choices[0]&&json.choices[0].delta;
          if(!delta)continue;
          const token=delta.content||'';
          if(!token)continue;
          full+=token;
          out.textContent+='['+token+']';
        }catch(e){}
      }
    }
  }catch(e){out.textContent='Error: '+e.message;}
}
test();
</script>
</body></html>
